name: drever_warr
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # 🔹 المكتبة المطلوبة لحل مشكلة No MaterialLocalizations found
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.4
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  dio: ^5.9.2
  get_it: ^9.2.1
  image_picker: ^1.2.1
  dartz: ^0.10.1
  pin_code_fields: ^8.0.1
  google_maps_flutter: ^2.14.2
  geolocator: ^14.0.2
  socket_io_client: ^3.1.4
  flutter_polyline_points: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - asets/icon/
    - asets/image/

  # إذا كان لديك خطوط مخصصة (مثل خط Cairo للعربية) أضفها هنا
